name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build KengaCAD/KengaCAD.csproj -c Release --nologo

  build-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build KengaCAD.Core/KengaCAD.Core.csproj -c Release --nologo

  build-android:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Install Android workload
        shell: pwsh
        run: dotnet workload install android maui-android --skip-manifest-update
      - name: Sync mobile config
        shell: pwsh
        run: .\scripts\sync_mobile_config.ps1
      - name: Build Android
        shell: pwsh
        run: dotnet build KengaCAD.Mobile/KengaCAD.Mobile.csproj -f net9.0-android -c Release --nologo
