name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build KengaCAD/KengaCAD.csproj -c Release --nologo

  build-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build KengaCAD.Core/KengaCAD.Core.csproj -c Release --nologo

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet workload install android maui-android --skip-manifest-update
      - run: |
          mkdir -p KengaCAD.Mobile/Resources/Raw/config/templates
          cp KengaCAD/config/*.json KengaCAD.Mobile/Resources/Raw/config/
          cp KengaCAD/config/templates/*.sbn KengaCAD.Mobile/Resources/Raw/config/templates/
      - run: dotnet build KengaCAD.Mobile/KengaCAD.Mobile.csproj -f net9.0-android -c Release --nologo
