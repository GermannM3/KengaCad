name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Decode signing certificate
        shell: pwsh
        env:
          KENGACAD_CODESIGN_PFX_BASE64: ${{ secrets.KENGACAD_CODESIGN_PFX_BASE64 }}
          KENGACAD_CODESIGN_PASS: ${{ secrets.KENGACAD_CODESIGN_PASS }}
        run: |
          if ($env:KENGACAD_CODESIGN_PFX_BASE64) {
            $bytes = [Convert]::FromBase64String($env:KENGACAD_CODESIGN_PFX_BASE64)
            $path = "$env:RUNNER_TEMP\kengacad_codesign.pfx"
            [IO.File]::WriteAllBytes($path, $bytes)
            echo "KENGACAD_CODESIGN_PFX=$path" >> $env:GITHUB_ENV
          }

      - name: Build Windows installer and ZIP
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          .\build_installer_professional.ps1
          $out = "installers\Output"
          if (Test-Path "$out\KengaCAD_Professional_Setup.exe") {
            Move-Item -Force "$out\KengaCAD_Professional_Setup.exe" "$out\KengaCAD_Professional_${ver}_Setup.exe"
          }
          if (Test-Path "$out\KengaCAD_Professional_win-x64_self-contained.zip") {
            Move-Item -Force "$out\KengaCAD_Professional_win-x64_self-contained.zip" "$out\KengaCAD_Professional_${ver}_win-x64.zip"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            installers/Output/KengaCAD_Professional_*_Setup.exe
            installers/Output/KengaCAD_Professional_*_win-x64.zip
            installers/Output/*.sha256
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          VER="${GITHUB_REF_NAME#v}"
          chmod +x scripts/stage_portable.sh installers/linux/build_appimage.sh
          bash scripts/stage_portable.sh "$VER" linux
      - name: Build AppImage
        continue-on-error: true
        run: |
          VER="${GITHUB_REF_NAME#v}"
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-venv python3-pip fuse libfuse2 libxkbcommon-x11-0 libxcb-cursor0 libgl1
          KENGACAD_VERSION="$VER" ./installers/linux/build_appimage.sh || true
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            installers/Output/KengaCAD_Professional_*_linux-x64_portable.tar.gz
            installers/Output/KengaCAD_Professional_*_linux-x64.AppImage
          if-no-files-found: warn

  build-macos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          VER="${GITHUB_REF_NAME#v}"
          chmod +x scripts/stage_portable.sh
          bash scripts/stage_portable.sh "$VER" macos
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: installers/Output/KengaCAD_Professional_*_macos_portable.tar.gz
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install Android workload
        run: dotnet workload install android maui --skip-manifest-update

      - name: Sync mobile config assets
        run: |
          mkdir -p KengaCAD.Mobile/Resources/Raw/config/templates
          cp KengaCAD/config/*.json KengaCAD.Mobile/Resources/Raw/config/
          cp KengaCAD/config/templates/*.sbn KengaCAD.Mobile/Resources/Raw/config/templates/

      - name: Build APK
        run: |
          VER="${GITHUB_REF_NAME#v}"
          dotnet publish KengaCAD.Mobile/KengaCAD.Mobile.csproj \
            -f net9.0-android -c Release \
            -p:AndroidPackageFormat=apk \
            -p:ApplicationDisplayVersion="$VER" \
            --nologo
          mkdir -p installers/Output
          APK=$(find KengaCAD.Mobile/bin/Release/net9.0-android -name "*.apk" | head -1)
          cp "$APK" "installers/Output/KengaCAD_Professional_${VER}_android.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: installers/Output/KengaCAD_Professional_*_android.apk
          if-no-files-found: error

  publish-release:
    needs: [build-windows, build-linux, build-macos, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - run: find release-assets -type f -ls
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**
