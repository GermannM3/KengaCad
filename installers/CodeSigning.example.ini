; Пример для Inno Setup: Tools → Configure Sign Tools → Add
; Имя инструмента: signtool
; Команда (одна строка; $f — подставит Inno Setup):
;
; signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f "C:\path\to\your.pfx" /p "YOUR_PASSWORD" $f
;
; После этого в KengaCAD_Professional.iss можно включить строки SignTool (см. комментарии в .iss)
; и собирать с ключом компилятора, например: /DSIGN=1 (если добавите #ifdef в скрипт).
